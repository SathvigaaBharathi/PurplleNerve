version: "3.9"
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: retail_intelligence
      POSTGRES_USER: retail
      POSTGRES_PASSWORD: retail_secret
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U retail"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://retail:retail_secret@postgres:5432/retail_intelligence
      REDIS_URL: redis://redis:6379
      LOG_LEVEL: INFO
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./data:/app/data  # for pos_transactions.csv and store_layout.json

  pipeline:
    build:
      context: .
      dockerfile: Dockerfile.pipeline
    profiles: ["pipeline"]  # only starts when explicitly invoked
    environment:
      REDIS_URL: redis://redis:6379
      API_URL: http://api:8000
    volumes:
      - ${CCTV_CLIPS_DIR:-../CCTV Footage}:/clips:ro  # Mounts the CCTV Footage folder read-only
      - ./data:/data:ro
      - ./output:/output   # JSONL output written here
    depends_on:
      redis:
        condition: service_healthy

volumes:
  pgdata:
  redisdata:
